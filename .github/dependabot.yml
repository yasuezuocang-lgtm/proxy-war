version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      # 細かいパッチを 1 PR にまとめる (ノイズ削減)
      patch-updates:
        patterns: ["*"]
        update-types: [patch]
      # devDependencies の minor もまとめる
      dev-minor:
        dependency-type: development
        update-types: [minor]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"
